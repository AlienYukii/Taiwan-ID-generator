<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台灣證號自動生成器 </title>
    <style>
        :root {
            --bg-color: #000080;       /* 海軍藍背景 */
            --card-bg: #000066;        /* 稍微深一點的藍色做卡片底色 */
            --accent-color: #F5F5DC;   /* 米色副顏色 */
            --input-bg: #00004d;       /* 輸入框背景 */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
            margin: 0;
            background: var(--bg-color); 
            color: var(--accent-color);
        }

        .card { 
            background: var(--card-bg); 
            padding: 2.5rem; 
            border-radius: 12px; 
            border: 2px solid var(--accent-color); /* 用米色做邊框增加質感 */
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            width: 100%;
            max-width: 450px; 
        }

        h2 { 
            border-bottom: 2px solid var(--accent-color); 
            padding-bottom: 15px; 
            color: var(--accent-color);
            text-align: center;
            margin-top: 0;
            letter-spacing: 2px;
        }

        .item { margin-bottom: 25px; }

        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 8px; 
            color: var(--accent-color);
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .result-wrapper { display: flex; gap: 10px; }

        input { 
            flex-grow: 1; 
            padding: 12px; 
            border: 1px solid var(--accent-color); 
            border-radius: 6px; 
            background: var(--input-bg);
            color: var(--accent-color);
            font-family: 'Courier New', Courier, monospace; 
            font-size: 1.2rem; 
            outline: none;
        }

        /* 讓 Placeholder 或唯讀狀態的文字也清晰 */
        input[readonly] {
            cursor: default;
        }

        button { 
            cursor: pointer; 
            background: var(--accent-color); 
            color: var(--bg-color); /* 按鈕文字用深藍色，對比度最高 */
            border: none; 
            padding: 0 20px; 
            border-radius: 6px; 
            transition: 0.3s; 
            font-weight: bold;
        }

        button:hover { 
            filter: brightness(0.9); /* 懸停時稍微變深 */
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="card">
    <h2>統編生成器</h2>
    
    <div class="item">
        <label>統一編號</label>
        <div class="result-wrapper">
            <input type="text" id="taxId" readonly>
            <button onclick="generateTaxId()">刷新</button>
        </div>
    </div>

    <div class="item">
        <label>身分證字號</label>
        <div class="result-wrapper">
            <input type="text" id="personalId" readonly>
            <button onclick="generatePersonalId()">刷新</button>
        </div>
    </div>

    <div class="item">
        <label>新版居留證號</label>
        <div class="result-wrapper">
            <input type="text" id="newResidentId" readonly>
            <button onclick="generateNewResidentId()">刷新</button>
        </div>
    </div>

    <div class="item">
        <label>舊版居留證號</label>
        <div class="result-wrapper">
            <input type="text" id="oldResidentId" readonly>
            <button onclick="generateOldResidentId()">刷新</button>
        </div>
    </div>
</div>

<script>
const CITY_CODE = {
    A: 10, B: 11, C: 12, D: 13, E: 14, F: 15, G: 16, H: 17, I: 34, J: 18, K: 19, L: 20, M: 21,
    N: 22, O: 35, P: 23, Q: 24, R: 25, S: 26, T: 27, U: 28, V: 29, W: 32, X: 30, Y: 31, Z: 33
};

function getRandomCity() {
    const letters = Object.keys(CITY_CODE);
    return letters[Math.floor(Math.random() * letters.length)];
}

// 1. 統一編號生成
function generateTaxId() {
    const weights = [1, 2, 1, 2, 1, 2, 4, 1];
    while (true) {
        let nums = Array.from({length: 7}, () => Math.floor(Math.random() * 10));
        let sum = 0;
        nums.forEach((n, i) => {
            let res = n * weights[i];
            sum += Math.floor(res / 10) + (res % 10);
        });
        
        for (let last = 0; last < 10; last++) {
            let total = sum + (last * weights[7]);
            if (total % 5 === 0) {
                document.getElementById('taxId').value = nums.join('') + last;
                return;
            }
        }
    }
}

// 2. 身分證 & 新版居留證共用邏輯
function generateTaiwanId(isResident = false) {
    const city = getRandomCity();
    const cityNum = CITY_CODE[city];
    const n0 = Math.floor(cityNum / 10);
    const n1 = cityNum % 10;
    
    // 第二碼：身分證 1-2, 新版居留證 8-9
    const secondDigit = isResident ? (Math.random() > 0.5 ? 8 : 9) : (Math.random() > 0.5 ? 1 : 2);
    let nums = [secondDigit, ...Array.from({length: 7}, () => Math.floor(Math.random() * 10))];
    
    let sum = n0 * 1 + n1 * 9;
    nums.forEach((n, i) => sum += n * (8 - i));
    
    const checkDigit = (10 - (sum % 10)) % 10;
    document.getElementById(isResident ? 'newResidentId' : 'personalId').value = city + nums.join('') + checkDigit;
}

// 3. 舊版居留證生成 (依據你提供的圖片規則)
function generateOldResidentId() {
    const city = getRandomCity();
    const cityNum = CITY_CODE[city];
    
    // 性別碼 A-D
    const sexLetters = ['A', 'B', 'C', 'D'];
    const sexLetter = sexLetters[Math.floor(Math.random() * sexLetters.length)];
    const sexNum = CITY_CODE[sexLetter] % 10; // 取轉換後的個位數
    
    let nums = Array.from({length: 7}, () => Math.floor(Math.random() * 10));
    
    let sum = Math.floor(cityNum / 10) * 1 + (cityNum % 10) * 9 + sexNum * 8;
    nums.forEach((n, i) => sum += n * (7 - i));
    
    const checkDigit = (10 - (sum % 10)) % 10;
    document.getElementById('oldResidentId').value = city + sexLetter + nums.join('') + checkDigit;
}

// 初始化
window.onload = () => {
    generateTaxId();
    generatePersonalId();
    generateNewResidentId();
    generateOldResidentId();
};

function generatePersonalId() { generateTaiwanId(false); }
function generateNewResidentId() { generateTaiwanId(true); }
</script>

</body>
</html>
