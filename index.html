<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Taiwan ID Generator & Tools</title>
    <style>
        :root {
            --bg-color: #4A4E69;
            --card-bg: #80A1C1;
            --accent-color: #FC9E4F;
            --input-bg: #FDFDFD;
            --success-color: #4CAF50;
            --error-color: #f44336;
            --text-on-card: #4A4E69;    /* 卡片上的文字：深灰藍 (確保清晰) */
            --btn-text: #FDFDFD;        /* 按鈕上的文字：純白 */
            --btn-bg: #A77E58;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-color); 
            color: var(--accent-color);
            position: relative;
            padding: 20px 0;
        }

        /* 右上角年份轉換器 */
        .year-converter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(246, 239, 166, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 150px;
            z-index: 100;
        }

        .year-converter label { font-size: 0.75rem; opacity: 0.8; }
        .year-converter input { padding: 8px; font-size: 1rem; text-align: center; }

        .card { 
            background: var(--card-bg); 
            padding: 2.5rem; 
            border-radius: 16px; 
            border: 1px solid rgba(246, 239, 166, 0.3); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            width: 100%;
            max-width: 420px; 
            margin-bottom: 20px;
        }

        /* 驗證區塊 */
        .validator-card {
            background: var(--input-bg);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px dashed var(--accent-color);
            width: 100%;
            max-width: 420px;
        }

        h2, h3 { 
            border-bottom: 2px solid var(--accent-color); 
            padding-bottom: 10px; 
            color: var(--accent-color);
            text-align: center;
            margin-top: 0;
        }

        .item { margin-bottom: 20px; }

        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 6px; 
            opacity: 0.9;
            font-size: 0.85rem;
        }

        .result-wrapper { display: flex; gap: 8px; }

        input { 
            flex-grow: 1; 
            padding: 12px; 
            border: 1.5px solid rgba(246, 239, 166, 0.4); 
            border-radius: 8px; 
            background: var(--input-bg);
            color: var(--accent-color);
            font-family: 'Consolas', 'Monaco', monospace; 
            font-size: 1.25rem; 
            font-weight: bold;
            outline: none;
            transition: all 0.2s;
        }

        .validator-card input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(255,255,255,0.05);
            margin-bottom: 10px;
            cursor: text;
        }

        button { 
            cursor: pointer; 
            background: var(--accent-color); 
            color: var(--card-bg); 
            border: none; 
            padding: 0 18px; 
            border-radius: 8px; 
            transition: 0.3s; 
            font-weight: 900;
        }

        button:hover { 
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        #validResult {
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        footer { margin-top: 30px; font-size: 0.8rem; opacity: 0.5; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="year-converter">
    <label>民國年 ⇄ 西元年</label>
    <input type="number" id="rocYear" placeholder="民國" oninput="rocToAd()">
    <input type="number" id="adYear" placeholder="西元" oninput="adToRoc()">
</div>

<div class="card">
    <h2>TAIWAN ID GEN</h2>
    <div class="item">
        <label>統一編號 (Tax ID)</label>
        <div class="result-wrapper">
            <input type="text" id="taxId" readonly onclick="copyToClipboard(this)">
            <button onclick="generateTaxId()">↺</button>
        </div>
    </div>
    <div class="item">
        <label>身分證字號 (National ID)</label>
        <div class="result-wrapper">
            <input type="text" id="personalId" readonly onclick="copyToClipboard(this)">
            <button onclick="generatePersonalId()">↺</button>
        </div>
    </div>
    <div class="item">
        <label>新版居留證 (New ARC)</label>
        <div class="result-wrapper">
            <input type="text" id="newResidentId" readonly onclick="copyToClipboard(this)">
            <button onclick="generateNewResidentId()">↺</button>
        </div>
    </div>
    <div class="item">
        <label>舊版居留證 (Old ARC)</label>
        <div class="result-wrapper">
            <input type="text" id="oldResidentId" readonly onclick="copyToClipboard(this)">
            <button onclick="generateOldResidentId()">↺</button>
        </div>
    </div>
</div>

<div class="validator-card">
    <h3>驗證工具 (Validator)</h3>
    <label>貼上任何證號進行校驗：</label>
    <input type="text" id="verifyInput" placeholder="在此輸入要檢查的號碼..." oninput="validateInput()">
    <div id="validResult">等待輸入...</div>
</div>

<footer>create by yuki</footer>

<script>
const CITY_CODE = {
    A: 10, B: 11, C: 12, D: 13, E: 14, F: 15, G: 16, H: 17, I: 34, J: 18, K: 19, L: 20, M: 21,
    N: 22, O: 35, P: 23, Q: 24, R: 25, S: 26, T: 27, U: 28, V: 29, W: 32, X: 30, Y: 31, Z: 33
};

// 年份轉換邏輯
function rocToAd() {
    const roc = document.getElementById('rocYear').value;
    document.getElementById('adYear').value = roc ? parseInt(roc) + 1911 : '';
}
function adToRoc() {
    const ad = document.getElementById('adYear').value;
    document.getElementById('rocYear').value = ad ? parseInt(ad) - 1911 : '';
}

// 驗證核心邏輯
function validateInput() {
    const val = document.getElementById('verifyInput').value.trim().toUpperCase();
    const resDiv = document.getElementById('validResult');
    if (!val) { resDiv.innerText = "等待輸入..."; resDiv.style.color = "inherit"; return; }

    // 1. 統一編號驗證 (8碼數字)
    if (/^\d{8}$/.test(val)) {
        if (checkTaxId(val)) {
            showResult("✅ 合法的統一編號", true);
        } else {
            showResult("❌ 統編檢核碼錯誤", false);
        }
        return;
    }

    // 2. 身分證 / 居留證驗證 (A-Z + 9碼)
    if (/^[A-Z][A-Z0-9]\d{8}$/.test(val)) {
        if (checkNationalId(val)) {
            const type = isNewARC(val) ? "新版居留證" : (isOldARC(val) ? "舊版居留證" : "身分證");
            showResult(`✅ 合法的${type}`, true);
        } else {
            showResult("❌ 證號格式或檢核碼錯誤", false);
        }
        return;
    }

    showResult("❓ 無法辨識的格式", false);
}

function showResult(msg, success) {
    const resDiv = document.getElementById('validResult');
    resDiv.innerText = msg;
    resDiv.style.color = success ? "var(--success-color)" : "var(--error-color)";
}

// 內部檢核邏輯
function checkTaxId(id) {
    const weights = [1, 2, 1, 2, 1, 2, 4, 1];
    let sum = 0;
    id.split('').forEach((n, i) => {
        let res = parseInt(n) * weights[i];
        sum += Math.floor(res / 10) + (res % 10);
    });
    if (sum % 5 === 0) return true;
    if (id[6] === '7' && (sum + 1) % 5 === 0) return true;
    return false;
}

function checkNationalId(id) {
    const c1 = CITY_CODE[id[0]];
    let sum = Math.floor(c1 / 10) + (c1 % 10) * 9;
    
    // 第二碼處理 (如果是字母代表舊居留證)
    let secondVal;
    if (isNaN(id[1])) {
        secondVal = CITY_CODE[id[1]] % 10;
    } else {
        secondVal = parseInt(id[1]);
    }
    
    sum += secondVal * 8;
    for (let i = 2; i < 9; i++) {
        sum += parseInt(id[i]) * (9 - i);
    }
    sum += parseInt(id[9]);
    return sum % 10 === 0;
}

function isNewARC(id) { return /^[A-Z][89]\d{8}$/.test(id); }
function isOldARC(id) { return /^[A-Z][A-D]\d{8}$/.test(id); }

// --- 以下為原本的生成邏輯 ---
function copyToClipboard(element) {
    navigator.clipboard.writeText(element.value);
    const originalVal = element.value;
    element.value = "Copied!";
    setTimeout(() => { element.value = originalVal; }, 600);
}

function generateTaxId() {
    const weights = [1, 2, 1, 2, 1, 2, 4, 1];
    while (true) {
        let nums = Array.from({length: 7}, () => Math.floor(Math.random() * 10));
        let sum = 0;
        nums.forEach((n, i) => {
            let res = n * weights[i];
            sum += Math.floor(res / 10) + (res % 10);
        });
        for (let last = 0; last < 10; last++) {
            let total = sum + (last * weights[7]);
            if (total % 5 === 0) {
                document.getElementById('taxId').value = nums.join('') + last;
                return;
            }
        }
    }
}

function generateTaiwanId(isResident = false) {
    const city = getRandomCity();
    const cityNum = CITY_CODE[city];
    const n0 = Math.floor(cityNum / 10);
    const n1 = cityNum % 10;
    const secondDigit = isResident ? (Math.random() > 0.5 ? 8 : 9) : (Math.random() > 0.5 ? 1 : 2);
    let nums = [secondDigit, ...Array.from({length: 7}, () => Math.floor(Math.random() * 10))];
    let sum = n0 * 1 + n1 * 9;
    nums.forEach((n, i) => sum += n * (8 - i));
    const checkDigit = (10 - (sum % 10)) % 10;
    document.getElementById(isResident ? 'newResidentId' : 'personalId').value = city + nums.join('') + checkDigit;
}

function generateOldResidentId() {
    const city = getRandomCity();
    const cityNum = CITY_CODE[city];
    const sexLetters = ['A', 'B', 'C', 'D'];
    const sexLetter = sexLetters[Math.floor(Math.random() * sexLetters.length)];
    const sexNum = CITY_CODE[sexLetter] % 10;
    let nums = Array.from({length: 7}, () => Math.floor(Math.random() * 10));
    let sum = Math.floor(cityNum / 10) * 1 + (cityNum % 10) * 9 + sexNum * 8;
    nums.forEach((n, i) => sum += n * (7 - i));
    const checkDigit = (10 - (sum % 10)) % 10;
    document.getElementById('oldResidentId').value = city + sexLetter + nums.join('') + checkDigit;
}

window.onload = () => {
    generateTaxId(); generateTaiwanId(false); generateTaiwanId(true); generateOldResidentId();
};

function generatePersonalId() { generateTaiwanId(false); }
function generateNewResidentId() { generateTaiwanId(true); }
</script>

</body>
</html>
