<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Taiwan ID Generator</title>
    <style>
        :root {
            --bg-color: #003366;       /* 背景：深藍 */
            --card-bg: #14024f;        /* 卡片底色：深紫藍 */
            --accent-color: #F6EFA6;   /* 副顏色：淡鵝黃 */
            --input-bg: #0a0129;       /* 輸入框背景：極深色 */
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            flex-direction: column; /* 改為垂直排列以容納 Footer */
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-color); 
            color: var(--accent-color);
        }

        .card { 
            background: var(--card-bg); 
            padding: 2.5rem; 
            border-radius: 16px; 
            border: 1px solid rgba(246, 239, 166, 0.3); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            width: 100%;
            max-width: 420px; 
        }

        h2 { 
            border-bottom: 2px solid var(--accent-color); 
            padding-bottom: 15px; 
            color: var(--accent-color);
            text-align: center;
            margin-top: 0;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .item { margin-bottom: 20px; }

        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 6px; 
            color: var(--accent-color);
            opacity: 0.9;
            font-size: 0.85rem;
        }

        .result-wrapper { display: flex; gap: 8px; }

        input { 
            flex-grow: 1; 
            padding: 12px; 
            border: 1.5px solid rgba(246, 239, 166, 0.4); 
            border-radius: 8px; 
            background: var(--input-bg);
            color: var(--accent-color);
            font-family: 'Consolas', 'Monaco', monospace; 
            font-size: 1.25rem; 
            font-weight: bold;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        input:hover {
            border-color: var(--accent-color);
            background: #000;
        }

        button { 
            cursor: pointer; 
            background: var(--accent-color); 
            color: var(--card-bg); 
            border: none; 
            padding: 0 18px; 
            border-radius: 8px; 
            transition: 0.3s; 
            font-weight: 900;
        }

        button:hover { 
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        .copy-hint {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 15px;
            opacity: 0.6;
        }

        /* 頁尾樣式 */
        footer {
            margin-top: 30px;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 1.5px;
            opacity: 0.5;
            text-transform: lowercase;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>TAIWAN ID GEN</h2>
    
    <div class="item">
        <label>統一編號 (Tax ID)</label>
        <div class="result-wrapper">
            <input type="text" id="taxId" readonly onclick="copyToClipboard(this)">
            <button onclick="generateTaxId()">↺</button>
        </div>
    </div>

    <div class="item">
        <label>身分證字號 (National ID)</label>
        <div class="result-wrapper">
            <input type="text" id="personalId" readonly onclick="copyToClipboard(this)">
            <button onclick="generatePersonalId()">↺</button>
        </div>
    </div>

    <div class="item">
        <label>新版居留證 (New ARC)</label>
        <div class="result-wrapper">
            <input type="text" id="newResidentId" readonly onclick="copyToClipboard(this)">
            <button onclick="generateNewResidentId()">↺</button>
        </div>
    </div>

    <div class="item">
        <label>舊版居留證 (Old ARC)</label>
        <div class="result-wrapper">
            <input type="text" id="oldResidentId" readonly onclick="copyToClipboard(this)">
            <button onclick="generateOldResidentId()">↺</button>
        </div>
    </div>

    <div class="copy-hint">💡 點擊輸入框即可複製號碼</div>
</div>

<footer>create by yuki</footer>

<script>
const CITY_CODE = {
    A: 10, B: 11, C: 12, D: 13, E: 14, F: 15, G: 16, H: 17, I: 34, J: 18, K: 19, L: 20, M: 21,
    N: 22, O: 35, P: 23, Q: 24, R: 25, S: 26, T: 27, U: 28, V: 29, W: 32, X: 30, Y: 31, Z: 33
};

function getRandomCity() {
    const letters = Object.keys(CITY_CODE);
    return letters[Math.floor(Math.random() * letters.length)];
}

function copyToClipboard(element) {
    navigator.clipboard.writeText(element.value);
    const originalVal = element.value;
    element.value = "Copied!";
    setTimeout(() => { element.value = originalVal; }, 600);
}

function generateTaxId() {
    const weights = [1, 2, 1, 2, 1, 2, 4, 1];
    while (true) {
        let nums = Array.from({length: 7}, () => Math.floor(Math.random() * 10));
        let sum = 0;
        nums.forEach((n, i) => {
            let res = n * weights[i];
            sum += Math.floor(res / 10) + (res % 10);
        });
        for (let last = 0; last < 10; last++) {
            let total = sum + (last * weights[7]);
            if (total % 5 === 0) {
                document.getElementById('taxId').value = nums.join('') + last;
                return;
            }
        }
    }
}

function generateTaiwanId(isResident = false) {
    const city = getRandomCity();
    const cityNum = CITY_CODE[city];
    const n0 = Math.floor(cityNum / 10);
    const n1 = cityNum % 10;
    const secondDigit = isResident ? (Math.random() > 0.5 ? 8 : 9) : (Math.random() > 0.5 ? 1 : 2);
    let nums = [secondDigit, ...Array.from({length: 7}, () => Math.floor(Math.random() * 10))];
    let sum = n0 * 1 + n1 * 9;
    nums.forEach((n, i) => sum += n * (8 - i));
    const checkDigit = (10 - (sum % 10)) % 10;
    document.getElementById(isResident ? 'newResidentId' : 'personalId').value = city + nums.join('') + checkDigit;
}

function generateOldResidentId() {
    const city = getRandomCity();
    const cityNum = CITY_CODE[city];
    const sexLetters = ['A', 'B', 'C', 'D'];
    const sexLetter = sexLetters[Math.floor(Math.random() * sexLetters.length)];
    const sexNum = CITY_CODE[sexLetter] % 10;
    let nums = Array.from({length: 7}, () => Math.floor(Math.random() * 10));
    let sum = Math.floor(cityNum / 10) * 1 + (cityNum % 10) * 9 + sexNum * 8;
    nums.forEach((n, i) => sum += n * (7 - i));
    const checkDigit = (10 - (sum % 10)) % 10;
    document.getElementById('oldResidentId').value = city + sexLetter + nums.join('') + checkDigit;
}

window.onload = () => {
    generateTaxId(); generateTaiwanId(false); generateTaiwanId(true); generateOldResidentId();
};

function generatePersonalId() { generateTaiwanId(false); }
function generateNewResidentId() { generateTaiwanId(true); }
</script>

</body>
</html>
